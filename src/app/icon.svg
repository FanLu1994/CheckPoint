  </defs>

  <rect width="128" height="128" rx="24" fill="url(#surface)"/>
  <path d="M22 30h84M22 98h84" stroke="#d4cfc5" stroke-opacity=".12" stroke-width="2"/>

  <rect x="28" y="40" width="14" height="48" rx="3" fill="#f5f3ef"/>
