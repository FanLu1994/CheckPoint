<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">Checkpoint icon</title>
  <desc id="desc">A terminal-style media log card with progress bars and a checkpoint marker.</desc>
  <defs>
    <linearGradient id="surface" x1="20" y1="14" x2="108" y2="116" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#25231d"/>
      <stop offset="1" stop-color="#12110e"/>
    </linearGradient>
    <linearGradient id="progress" x1="34" y1="86" x2="96" y2="36" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00a86b"/>
      <stop offset="1" stop-color="#0798b4"/>
