  <path d="M32 96h20l15-15 10 10 23-28" fill="none" stroke="url(#progress)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="100" cy="63" r="13" fill="#12110e" stroke="#00a86b" stroke-width="6"/>
  <path d="M94 63l4 4 9-10" fill="none" stroke="#f5f3ef" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
